    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a12; color: #fff; font-family: 'Space Grotesk', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes scan-line { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
      textarea:focus, input:focus { border-color: rgba(0,255,200,0.3) !important; outline: none; }
